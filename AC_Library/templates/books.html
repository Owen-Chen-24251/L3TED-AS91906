{% extends 'base.html' %}

{% block content_top %}
<h2>Books Page</h2>

<table border="5">
    <tr>
        <th>Book Cover</th>
        <th>Title</th>
        <th>Author</th>
        <th>Copies Available</th>
    </tr>
    {% for book in books %}
    <tr>
        <td><img src="{{ book.img.url }}" width="100"></td>
        <td>{{ book.title }}</td>
        <td>{{ book.author }}</td>
        <td>{{ book.total_copies }}</td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
