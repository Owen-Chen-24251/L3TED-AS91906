{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alfriston College Library Website</title>
    <style>
        /* Base layout styles only */
        :root {
            --brand-blue: #6cb3e0; 
            --text-dark: #1a2330;
            --text-muted: #5f6c7a;
            --shadow: 0 18px 45px rgba(26, 35, 48, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: Inter, "Segoe UI", system-ui, sans-serif;
            color: var(--text-dark);
            background: #eef4fa;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .page-shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .site-header {
            background: var(--brand-blue);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .brand-row {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .brand-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(255,255,255,0.35);
            display: grid;
            place-items: center;
            color: white;
            font-weight: 700;
        }

        .brand-title {
            min-width: 180px;
            padding: 0.55rem 1rem;
            border-radius: 999px;
            background: rgba(255,255,255,0.95);
            color: var(--text-dark);
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .site-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            flex: 1;
        }

        .site-nav a {
            color: white;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .site-nav a:hover {
            opacity: 0.9;
        }

        .header-action {
            padding: 0.8rem 1.2rem;
            border-radius: 999px;
            background: rgba(255,255,255,0.22);
            color: white;
            border: 1px solid rgba(255,255,255,0.18);
            font-weight: 600;
        }

        .section-top,
        .section-middle,
        .section-bottom {
            width: 100%;
            padding: 2.5rem 0;
            display: flex;
            justify-content: center;
        }

        .section-inner {
            width: min(1200px, calc(100% - 1rem));
            margin: 0 auto;
            padding: 0 1rem;
            min-height: 220px;
        }

        .section-top {
            background: rgba(255, 255, 255, 0.92);
            box-shadow: var(--shadow);
        }

        .section-middle {
            background: var(--brand-blue);
            color: white;
        }

        .section-bottom {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: var(--shadow);
        }

        footer {
            padding: 1.25rem 2rem;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        @media (max-width: 900px) {
            .site-header {
                flex-wrap: wrap;
                justify-content: center;
                text-align: center;
            }
            .site-nav {
                order: 3;
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div class="brand-row">
                <img class="brand-icon" src="{% static 'AC_Library/AC_Logo.jpg' %}" alt="AC Library Logo"> 
                <div class="brand-title">Alfriston College Library</div>
            </div>
            <nav class="site-nav">
                <a href="/">Home</a>
                <a href="/aboutus/">About</a>
                <a href="/books/">Books</a>
            </nav> 
            <div class="header-action">User</div> 
        </header>

        <section class="section-top">
            <div class="section-inner">
                {% block section_top %}
                {% endblock %}
            </div>
        </section>

        <section class="section-middle">
            <div class="section-inner">
                {% block section_middle %}
                {% endblock %}
            </div>
        </section>

        <section class="section-bottom">
            <div class="section-inner">
                {% block section_bottom %}
                {% endblock %}
            </div>
        </section>

        <footer>
            Susan Impey Library · All Rights Reserved
        </footer>
    </div>
</body>
</html>
